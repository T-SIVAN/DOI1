services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      APP_AUTH_MODE: ${APP_AUTH_MODE:-oidc}
      APP_PERSISTENCE_BACKEND: ${APP_PERSISTENCE_BACKEND:-postgres_cos}
      DATABASE_URL: ${DATABASE_URL}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY}
    expose:
      - "8501"
    volumes:
      - ${STREAMLIT_SECRETS_FILE:-./.streamlit/secrets.toml}:/app/.streamlit/secrets.toml:ro
    networks:
      - private

  cos-delete-worker:
    build:
      context: .
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    command: ["python", "cos_delete_worker.py"]
    env_file:
      - .env
    environment:
      COS_DELETE_WORKER_DATABASE_URL: ${COS_DELETE_WORKER_DATABASE_URL}
      COS_DELETE_WORKER_DB_ROLE: ${COS_DELETE_WORKER_DB_ROLE:-research_cos_delete_worker}
      COS_DELETE_WORKER_POLL_SECONDS: ${COS_DELETE_WORKER_POLL_SECONDS:-10}
      COS_DELETE_WORKER_BATCH_SIZE: ${COS_DELETE_WORKER_BATCH_SIZE:-100}
      COS_DELETE_WORKER_LEASE_SECONDS: ${COS_DELETE_WORKER_LEASE_SECONDS:-300}
      COS_DELETE_WORKER_RETRY_BASE_SECONDS: ${COS_DELETE_WORKER_RETRY_BASE_SECONDS:-30}
      COS_DELETE_WORKER_RETRY_MAX_SECONDS: ${COS_DELETE_WORKER_RETRY_MAX_SECONDS:-3600}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY}
    healthcheck:
      disable: true
    networks:
      - private

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${TLS_CERT_DIR:-./deploy/certs}:/etc/nginx/certs:ro
    networks:
      - private

networks:
  private:
    driver: bridge
